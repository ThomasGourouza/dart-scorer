<div
  class="layout"
  [class.layout--drawer-open]="drawerOpen()"
  [class.layout--sidebar-collapsed]="sidebarCollapsed()"
>
  <header class="topbar">
    <button
      type="button"
      class="menu-btn"
      (click)="toggleDrawer()"
      [attr.aria-expanded]="drawerOpen()"
      aria-controls="primary-nav"
      aria-label="Toggle navigation"
    >
      <span class="menu-bar"></span>
      <span class="menu-bar"></span>
      <span class="menu-bar"></span>
    </button>

    <a [routerLink]="playUrl()" class="brand">
      <img class="brand-mark" src="dart-target.png" alt="" aria-hidden="true" />
      <span class="brand-text">{{ title }}</span>
    </a>

    <app-status-pill class="topbar__status" />

    <button
      type="button"
      class="abort"
      (click)="abort()"
      [disabled]="!game.hasActiveGame()"
    >
      {{ game.isFinished() ? 'New game' : 'Abort game' }}
    </button>
  </header>

  <aside
    id="primary-nav"
    class="sidenav"
    [class.sidenav--open]="drawerOpen()"
    aria-label="Primary navigation"
  >
    <div class="sidenav__toolbar">
      <button
        type="button"
        class="sidenav-collapse"
        (click)="toggleSidebarCollapsed()"
        [attr.aria-expanded]="!sidebarCollapsed()"
        aria-controls="primary-nav"
        [attr.aria-label]="sidebarCollapsed() ? 'Expand sidebar' : 'Collapse sidebar'"
      >
        <span class="sidenav-collapse__glyph" aria-hidden="true">{{
          sidebarCollapsed() ? '»' : '«'
        }}</span>
      </button>
    </div>

    <nav class="sidenav__inner">
      <ul class="nav-list">
        @for (item of navItems; track item.path) {
          <li>
            <a
              [routerLink]="item.path"
              routerLinkActive="nav-link--active"
              [routerLinkActiveOptions]="{ exact: false }"
              class="nav-link"
              [attr.title]="item.label"
            >
              <span class="nav-icon" [attr.data-icon]="item.icon" aria-hidden="true"></span>
              <span class="nav-label">{{ item.label }}</span>
            </a>
          </li>
        }
      </ul>
    </nav>

    <div class="sidenav__foot">
      <a routerLink="/" class="nav-cta" title="New game">
        <span class="nav-cta__icon" aria-hidden="true">+</span>
        <span class="nav-cta__label">New game</span>
      </a>
    </div>
  </aside>

  <button
    type="button"
    class="scrim"
    aria-label="Close navigation"
    (click)="closeDrawer()"
    [hidden]="!drawerOpen()"
  ></button>

  <main class="shell">
    <router-outlet />
  </main>
</div>
