@if (players().length > 0) {
  <div class="radar">
    @if (series().length > 0) {
      <svg
        class="radar__svg"
        [attr.viewBox]="'0 0 ' + svgSize + ' ' + svgSize"
        [attr.width]="svgSize"
        [attr.height]="svgSize"
        role="img"
        aria-label="Players comparison radar chart"
      >
        <g class="radar__grid">
          @for (r of ringRadii; track r) {
            <circle
              class="radar__ring"
              [attr.cx]="center"
              [attr.cy]="center"
              [attr.r]="r"
            />
          }
          @for (axis of axes(); track axis.key) {
            <line
              class="radar__spoke"
              [attr.x1]="center"
              [attr.y1]="center"
              [attr.x2]="axis.x"
              [attr.y2]="axis.y"
            />
          }
        </g>

        <g class="radar__series">
          @for (s of series(); track s.playerName) {
            <polygon
              class="radar__polygon"
              [attr.points]="s.polygonPoints"
              [attr.stroke]="s.stroke"
              [attr.fill]="s.fill"
            />
            @for (v of s.vertices; track $index) {
              <circle
                class="radar__dot"
                [attr.cx]="v.x"
                [attr.cy]="v.y"
                [attr.fill]="s.stroke"
                r="3"
              />
            }
          }
        </g>

        <g class="radar__labels">
          @for (axis of axes(); track axis.key) {
            <text
              class="radar__axis-label"
              [attr.x]="axis.labelX"
              [attr.y]="axis.labelY"
              [attr.text-anchor]="axis.labelAnchor"
              dominant-baseline="middle"
            >
              {{ axis.label }}
            </text>
            @if (axis.maxLabel) {
              <text
                class="radar__axis-max"
                [attr.x]="axis.labelX"
                [attr.y]="axis.labelY + 12"
                [attr.text-anchor]="axis.labelAnchor"
                dominant-baseline="hanging"
              >
                max {{ axis.maxLabel }}
              </text>
            }
          }
        </g>
      </svg>
    } @else {
      <p class="radar__empty">Select at least one player.</p>
    }

    <ul class="radar__legend">
      @for (p of players(); track p.playerName) {
        <li>
          <button
            type="button"
            class="radar__legend-item"
            [class.radar__legend-item--off]="!isVisible(p.playerName)"
            [attr.aria-pressed]="isVisible(p.playerName)"
            (click)="toggle(p.playerName)"
          >
            <span class="radar__legend-dot" [style.background]="legendColor(p)"></span>
            <span class="radar__legend-name">{{ p.playerName }}</span>
            <span class="radar__legend-games">{{ p.gamesPlayed }} games</span>
          </button>
        </li>
      }
    </ul>
  </div>
}
