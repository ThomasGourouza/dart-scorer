<div class="setup">
  <h1>New game</h1>

  @if (game.hasActiveGame()) {
    <div class="resume-banner">
      <p class="resume-text">A game is in progress.</p>
      <button type="button" class="resume" (click)="resume()">Resume game</button>
    </div>
  }

  <section class="field">
    <label for="playerCount">Number of players</label>
    <select id="playerCount" [value]="playerCount" (change)="onCountChange($event)">
      @for (c of [2, 3, 4, 5, 6, 7, 8, 9, 10]; track c) {
        <option [value]="c">{{ c }}</option>
      }
    </select>
  </section>

  <section class="names">
    <h2>Players</h2>
    @for (idx of slotIndexes(); track idx) {
      <div class="player-card">
        <div class="player-card-head">
          <input
            type="text"
            [(ngModel)]="names[idx]"
            [name]="'p' + idx"
            autocomplete="name"
            [attr.aria-label]="'Player ' + (idx + 1) + ' name'"
          />
        </div>
        <div class="swatches" role="group" [attr.aria-label]="'Color for player ' + (idx + 1)">
          @for (col of palette; track col.id) {
            <button
              type="button"
              class="swatch"
              [class.selected]="colorIds[idx] === col.id"
              [disabled]="colorDisabledForRow(idx, col.id)"
              [style.--swatch]="col.accent"
              (click)="pickColor(idx, col.id)"
              [attr.aria-label]="col.label"
              [attr.aria-pressed]="colorIds[idx] === col.id"
            ></button>
          }
        </div>
      </div>
    }
  </section>

  <section class="field variant">
    <span class="label-text">Game variant</span>
    <div class="segmented" role="group" aria-label="Starting score">
      <label>
        <input type="radio" name="variant" [value]="301" [(ngModel)]="variant" />
        <span>301</span>
      </label>
      <label>
        <input type="radio" name="variant" [value]="501" [(ngModel)]="variant" />
        <span>501</span>
      </label>
    </div>
  </section>

  <button type="button" class="primary" (click)="start()">Start game</button>
</div>
