<div class="winner" role="status">
  <h2>Congratulations!</h2>
  <p class="winner-name">{{ winnerName }} wins.</p>

  <div class="winner-actions">
    <button type="button" class="secondary" (click)="downloadHistory.emit()" [disabled]="disabled">
      Download history
    </button>
    <button type="button" class="secondary" (click)="emailHistory.emit()" [disabled]="disabled">
      Email history
    </button>
  </div>

  <button type="button" class="secondary takeback" (click)="newGame.emit()" [disabled]="disabled">
    New game
  </button>
</div>
