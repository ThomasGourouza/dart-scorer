@if (open) {
  <div class="dialog-backdrop" role="presentation" (click)="requestClose()"></div>
  <div class="dialog" role="dialog" aria-modal="true" aria-label="Email history">
    <h3>Email history</h3>
    <label class="dialog-label">
      <span>Email address</span>
      <input
        type="email"
        [(ngModel)]="emailTo"
        autocomplete="email"
        placeholder="name@example.com"
      />
    </label>
    <div class="dialog-actions">
      <button type="button" class="secondary" (click)="requestClose()">Cancel</button>
      <button type="button" class="primary" (click)="submit()" [disabled]="emailTo.trim().length === 0">
        Open email
      </button>
    </div>
  </div>
}
